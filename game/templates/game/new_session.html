{% extends "base.html" %}


{% block page_title %}{{ game.name }}{% endblock %}

{% block content %}

<div class="container w-50 text-center">
  <div><p>{{ game.description }}</p></div>
  <div class="container">
    <form method="POST">
      {% csrf_token %}
      {{ form.errors }}
      <table class="table table-borderless">
        <tr>
          <th>Player Name</th><td>{{ form.name }} {{ form.name.errors.as_text }}</td>
        </tr>
        <tr><th colspan=2 class="text-center"><button type="submit" class="btn btn-primary">Begin!</button></th></tr>
      </table>
    </form>
  </div>
</div>

{% endblock %}
