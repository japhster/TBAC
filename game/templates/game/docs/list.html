{% extends "base.html" %}

{% block content %}
  <div class="container">
    <table class="table">
      <thead><tr><th>Documentation</th></tr></thead>
      <tbody>
        {% for doc_name, doc_href in pages %}
          <tr><td><a href="{{ doc_href }}">{{ doc_name }}</a></td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
{% endblock %}
