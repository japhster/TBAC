<div class="container w-75 text-center">
  <table class="table mt-2" style="table-layout:fixed">
    <thead>
      <tr><th colspan=3>
        <a href="{% url 'npc:new_friend' game.pk %}" class="card-link">+ New Friend</a>
      </th></tr>

      <tr><th>Friend</th><th>Location</th><th>Actions</th></tr>
    </thead>
    <tbody>
      {% for friend in game.friends.base %}
        <tr>
          <th><a href="{% url 'npc:friend' friend.pk %}">{{ friend.name }}</a></th>
          <td>{{ friend.room.name }}</td>
          <td>
            <a href="{% url 'npc:edit_friend' friend.pk %}" style="text-decoration:none">
              {% include "icons/edit.html" %}
            </a>
            <a href="{% url 'npc:delete_friend' friend.pk %}" style="text-decoration:none">
              {% include "icons/delete.html" %}
            </a>
          </td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
