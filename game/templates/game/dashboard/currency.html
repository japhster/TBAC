<div class="container w-75 text-center">
  <table class="table table-fixed mt-2">
    <thead>
      <tr><th colspan=3>
        <a href="{% url 'game:new_currency' game.pk %}" class="card-link">+ new currency</a>
      </th></tr>

      <tr><th>Currency Name</th><th>Starting Amount</th><th>Actions</th></tr>
    </thead>
    <tbody>
      {% for currency in game.currencies.all %}
        <tr>
          <th>{{ currency.name }}</th>
          <th>{{ currency.starting_amount }}</th>
          <td>
            <a href="{% url 'game:edit_currency' currency_pk=currency.pk %}" style="text-decoration:none">
              {% include "icons/edit.html" %}
            </a>
          </td>
        </tr>
      {% empty %}
        <tr><th colspan=2>No currencies have been added</th></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
